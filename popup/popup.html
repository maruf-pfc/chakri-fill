<!DOCTYPE html>
<html>
  <head>
    <title>ChakriFill - Smart BD Job Autofill</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ChakriFill toolbar popup. Autofill Bangladesh Teletalk job applications with one click.">
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="popup-container">
      <header>
        <img src="../assets/icons/icon32.png" alt="ChakriFill Logo" class="logo-img" />
        <div class="title-section">
          <h1>ChakriFill</h1>
          <p>Autofill BD Job Applications</p>
        </div>
      </header>

      <!-- Dynamic Status Card -->
      <div class="status-card" id="statusCard">
        <div class="status-row" style="margin-bottom: 4px;">
          <span class="status-label">Active Profile:</span>
          <select id="popupProfileSelect" class="popup-profile-select" title="Active Profile">
            <option value="Default">Default</option>
          </select>
        </div>
        <div class="status-row">
          <span class="status-label">Profile Status:</span>
          <span class="status-badge empty" id="statusBadge">Empty</span>
        </div>
        
        <div id="profileDetails" style="display: none;">
          <div class="profile-preview">
            <div class="preview-item">
              <span class="preview-key">Name:</span>
              <span class="preview-val" id="profileName">-</span>
            </div>
            <div class="preview-item">
              <span class="preview-key">Mobile:</span>
              <span class="preview-val" id="profileMobile">-</span>
            </div>
            <div class="preview-item">
              <span class="preview-key">Academic:</span>
              <span class="preview-val" id="profileEdu">-</span>
            </div>
          </div>
        </div>

        <div id="emptyWarning" style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.3;">
          No profile profile setup yet. Configure your details to start autofilling forms.
        </div>
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button class="btn btn-primary" id="fillBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Autofill Job Form
        </button>
        <button class="btn btn-secondary" id="settingsBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          Profile Manager
        </button>
      </div>

      <footer>
        ChakriFill v1.0.0 &bull; <a href="#" id="helpLink">How to use</a>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
